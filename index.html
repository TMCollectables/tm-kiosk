<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Card Kiosk - Customer View</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TM Collectables">
    <meta name="theme-color" content="#2d5a9e">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #141937;
            --bg-tertiary: #1e2347;
            --accent-primary: #4c6fff;
            --accent-secondary: #7b5cff;
            --text-primary: #ffffff;
            --text-secondary: #a0a8db;
            --text-tertiary: #6b7399;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --card-hover: #252b52;
            --modal-backdrop: rgba(10, 14, 39, 0.95);
            --border-radius: 12px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f1535 50%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Top Area */
        .top-area {
            padding: 24px 32px;
            background: rgba(20, 25, 55, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .version-badge {
            position: fixed;
            top: 12px;
            right: 12px;
            background: rgba(76, 111, 255, 0.2);
            border: 1px solid var(--accent-primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'Space Grotesk', monospace;
            color: var(--accent-primary);
            z-index: 101;
            cursor: help;
        }
        
        /* Eeveelution Modal */
        .eeveelution-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: transparent;
            z-index: 10000;
            pointer-events: none;
        }
        
        .eeveelution-modal.active {
            display: block;
        }
        
        .eeveelution-content {
            position: absolute;
            top: 80px;
            left: 900px;
            width: 280px;
            height: 280px;
            pointer-events: auto;
        }
        
        .eeveelution-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--accent-primary);
            background: var(--bg-tertiary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(76, 111, 255, 0.5);
        }
        
        .eeveelution-center:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 0 30px rgba(76, 111, 255, 0.7);
        }
        
        .eeveelution-center.selected {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.7);
        }
        
        .eeveelution-center img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .eeveelution-option {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: var(--bg-tertiary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .eeveelution-option:hover {
            transform: scale(1.15);
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(76, 111, 255, 0.5);
        }
        
        .eeveelution-option.selected {
            border-color: var(--accent-secondary);
            background: linear-gradient(135deg, rgba(76, 111, 255, 0.3), rgba(139, 92, 246, 0.3));
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
        }
        
        .eeveelution-name {
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        
        .eeveelution-ok-btn {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 30px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .eeveelution-ok-btn:hover {
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 8px 20px rgba(76, 111, 255, 0.4);
        }
        
        .eeveelution-close {
            position: absolute;
            top: -30px;
            right: -30px;
            background: var(--bg-tertiary);
            border: 2px solid var(--accent-primary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .eeveelution-close:hover {
            background: var(--accent-primary);
            transform: scale(1.1);
        }
        
        /* Quick Access Buttons */
        .quick-access {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid transparent;
            background: linear-gradient(var(--bg-tertiary), var(--bg-tertiary)) padding-box,
                        linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)) border-box;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            position: relative;
            overflow: hidden;
        }
        
        .quick-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(76, 111, 255, 0.3), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .quick-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        .quick-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 24px rgba(76, 111, 255, 0.4);
        }
        
        .quick-btn:hover::before {
            opacity: 1;
        }
        
        .quick-btn-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
            color: var(--text-secondary);
        }
        
        .quick-btn.active {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(76, 111, 255, 0.2);
        }
        
        /* Search Bar */
        .search-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }
        
        .search-bar {
            width: 100%;
            padding: 16px 56px 16px 48px;
            background: var(--bg-tertiary);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }
        
        .search-bar:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(76, 111, 255, 0.15);
        }
        
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 20px;
        }
        
        .clear-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            display: none;
        }
        
        .clear-btn.visible {
            display: block;
        }
        
        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
        
        .clear-all-btn {
            margin-top: 16px;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: var(--border-radius);
            color: white;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .clear-all-btn.visible {
            display: flex;
        }
        
        .clear-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(76, 111, 255, 0.4);
        }
        
        .search-results-count {
            text-align: center;
            margin-top: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }
        
        /* Sort & Filter Bar */
        .controls-bar {
            padding: 20px 32px;
            background: rgba(30, 35, 71, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .sort-label {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .sort-btn, .filter-btn {
            padding: 10px 20px;
            background: var(--bg-tertiary);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .sort-btn:hover, .filter-btn:hover {
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.15);
        }
        
        .sort-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }
        
        .filter-btn {
            margin-left: auto;
        }
        
        /* Card Grid */
        .main-content {
            padding: 32px;
            max-width: 1800px;
            margin: 0 auto;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }
        
        @media (min-width: 1400px) {
            .card-grid {
                grid-template-columns: repeat(7, 1fr);
            }
        }
        
        @media (max-width: 1024px) and (orientation: portrait) {
            .card-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (max-width: 1024px) and (orientation: landscape) {
            .card-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }
        
        /* Card */
        .card {
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
        }
        
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 16px 40px rgba(76, 111, 255, 0.3);
            border-color: var(--accent-primary);
        }
        
        .card-image-container {
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #1e293b, #334155);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .card-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .card-placeholder {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }
        
        .card-bookmark {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .card-bookmark:hover {
            background: var(--accent-primary);
            color: white;
        }
        
        .card-info {
            padding: 12px;
        }
        
        .card-quantity {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .card-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Skeleton Loader */
        .skeleton {
            background: linear-gradient(90deg, 
                var(--bg-secondary) 0%, 
                var(--bg-tertiary) 50%, 
                var(--bg-secondary) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .skeleton-card {
            aspect-ratio: 2/3;
            border-radius: var(--border-radius);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        .empty-text {
            font-size: 16px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--modal-backdrop);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn 0.3s;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            max-width: 1200px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            display: flex;
            gap: 40px;
            padding: 40px;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        }
        
        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modal-nav {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 12px;
            right: 20px;
        }
        
        .modal-nav-btn, .modal-close {
            width: 40px;
            height: 40px;
            background: var(--bg-tertiary);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .modal-nav-btn:hover, .modal-close:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            transform: scale(1.1);
        }
        
        .modal-image-container {
            flex: 1;
            min-width: 400px;
        }
        
        .modal-card-image {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #1e293b, #334155);
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 40px;
            text-align: center;
        }
        
        .modal-details {
            flex: 1;
            min-width: 400px;
        }
        
        .modal-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .modal-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        
        .detail-section {
            margin-bottom: 32px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
            margin-bottom: 16px;
        }
        
        .condition-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .condition-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .condition-label {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .condition-badge {
            padding: 4px 12px;
            background: rgba(76, 111, 255, 0.15);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-primary);
        }
        
        .price-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .price-label {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .price-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--success);
        }
        
        .price-age {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }
        
        .update-price-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: var(--border-radius);
            color: white;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }
        
        .update-price-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(76, 111, 255, 0.4);
        }
        
        .update-price-btn.loading {
            background: var(--bg-tertiary);
            cursor: not-allowed;
        }
        
        /* eBay Sold Listings Styles */
        .ebay-section {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .ebay-loading {
            text-align: center;
            padding: 40px;
            color: var(--text-tertiary);
        }
        
        .ebay-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .ebay-stat-card {
            background: var(--bg-tertiary);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        
        .ebay-stat-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }
        
        .ebay-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .ebay-stat-value.price {
            color: var(--success);
        }
        
        .grade-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        
        .grade-btn {
            padding: 10px 20px;
            background: var(--bg-tertiary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .grade-btn:hover {
            background: var(--bg-primary);
            border-color: var(--accent-primary);
        }
        
        .grade-btn.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-color: transparent;
            color: white;
        }
        
        .grade-btn .count {
            font-size: 11px;
            opacity: 0.7;
            margin-left: 4px;
        }
        
        .sales-table {

        // Eeveelution Modal Initialization (MUST be defined before init() calls it)
        function initEeveelutionModal() {
            console.log('🦊 Initializing Eeveelution modal...');
            const modal = document.getElementById('eeveelutionModal');
            const closeBtn = document.getElementById('eeveelutionClose');
            const okBtn = document.getElementById('eeveelutionOkBtn');
            const centerBtn = document.querySelector('.eeveelution-center');
            const evolutionBtns = document.querySelectorAll('.eeveelution-option');
            
            if (!modal || !centerBtn) {
                console.error('❌ Eeveelution modal elements not found!');
                return;
            }
            
            console.log('✅ Modal elements found, attaching listeners...');
            let selectedPokemon = new Set();
            
            // Open modal when Eevee quick button is clicked
            const eeveeQuickBtn = document.querySelector('[data-pokemon="Eevee"].quick-btn');
            if (eeveeQuickBtn) {
                eeveeQuickBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    console.log('🦊 Eevee button clicked, opening modal');
                    modal.classList.add('active');
                    selectedPokemon.clear();
                    centerBtn.classList.remove('selected');
                    evolutionBtns.forEach(btn => btn.classList.remove('selected'));
                });
                console.log('✅ Eevee button listener attached');
            } else {
                console.error('❌ Eevee quick button not found!');
            }
            
            // Center Eevee button - toggle selection
            centerBtn.addEventListener('click', () => {
                if (selectedPokemon.has('Eevee')) {
                    selectedPokemon.delete('Eevee');
                    centerBtn.classList.remove('selected');
                } else {
                    selectedPokemon.add('Eevee');
                    centerBtn.classList.add('selected');
                }
                // Apply filter INSTANTLY but keep modal open
                applyEeveelutionFilter();
            });
            
            // Evolution buttons - toggle selection
            evolutionBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const pokemon = btn.dataset.pokemon;
                    if (selectedPokemon.has(pokemon)) {
                        selectedPokemon.delete(pokemon);
                        btn.classList.remove('selected');
                    } else {
                        selectedPokemon.add(pokemon);
                        btn.classList.add('selected');
                    }
                    // Apply filter INSTANTLY but keep modal open
                    applyEeveelutionFilter();
                });
            });
            
            // Apply filter instantly
            function applyEeveelutionFilter() {
                if (selectedPokemon.size === 0) {
                    // No selection - show all cards
                    filteredCards = [...realCards];
                } else {
                    // Filter to selected Pokemon
                    filteredCards = realCards.filter(card => selectedPokemon.has(card.name));
                }
                
                // Clear other quick buttons
                document.querySelectorAll('.quick-btn').forEach(btn => btn.classList.remove('active'));
                if (eeveeQuickBtn) eeveeQuickBtn.classList.add('active');
                
                renderCards(filteredCards);
                updateResultsCount();
                checkClearAllVisibility();
            }
            
            // OK Button - just close modal (filter already applied)
            okBtn.addEventListener('click', () => {
                modal.classList.remove('active');
            });
            
            // Close button
            closeBtn.addEventListener('click', () => {
                modal.classList.remove('active');
            });
            
            // Close on backdrop click
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
            
            // Close on ESC key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    modal.classList.remove('active');
                }
            });
            
            console.log('✅ Eeveelution modal initialization complete!');
        }
        
        // Initialize
        function init() {
            renderCards(filteredCards);
            updateResultsCount();
            attachEventListeners();
            checkClearAllVisibility();
            initEeveelutionModal();
        }
        
        // Check if Clear All button should be visible
        function checkClearAllVisibility() {
            const hasSearch = searchInput.value.length > 0;
            const hasQuickFilter = document.querySelector('.quick-btn.active') !== null;
            const hasRarityFilter = document.querySelectorAll('.filter-rarity:checked').length > 0;
            const hasTypeFilter = document.querySelectorAll('.filter-type:checked').length > 0;
            
            const clearAllBtn = document.getElementById('clearAllBtn');
            if (hasSearch || hasQuickFilter || hasRarityFilter || hasTypeFilter) {
                clearAllBtn.classList.add('visible');
            } else {
                clearAllBtn.classList.remove('visible');
            }
        }
        
        // Clear All Filters
        document.getElementById('clearAllBtn').addEventListener('click', () => {
            // Clear search
            searchInput.value = '';
            document.getElementById('clearBtn').classList.remove('visible');
            
            // Clear quick access buttons
            document.querySelectorAll('.quick-btn').forEach(btn => btn.classList.remove('active'));
            
            // Clear filter checkboxes
            document.querySelectorAll('.filter-rarity, .filter-type').forEach(checkbox => {
                checkbox.checked = false;
            });
            
            // Reset to all cards
            filteredCards = [...realCards];
            
            // Re-apply current sort
            const activeSortBtn = document.querySelector('.sort-btn.active');
            if (activeSortBtn) {
                const sortType = activeSortBtn.dataset.sort;
                filteredCards.sort((a, b) => {
                    switch(sortType) {
                        case 'year': return b.year - a.year;
                        case 'name': return a.name.localeCompare(b.name);
                        case 'price': return b.price - a.price;
                        case 'rarity': 
                            const rarityOrder = {'Ultra Rare': 4, 'Holo Rare': 3, 'Rare': 2, 'Uncommon': 1, 'Common': 0};
                            return (rarityOrder[b.rarity] || 0) - (rarityOrder[a.rarity] || 0);
                        default: return 0;
                    }
                });
            }
            
            renderCards(filteredCards);
            updateResultsCount();
            checkClearAllVisibility();
        });
        
        // Render Cards
        function renderCards(cards) {
            const grid = document.getElementById('cardGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (cards.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            grid.innerHTML = cards.map((card, index) => `
                <div class="card" data-index="${index}" onclick="openModal(${index})">
                    <div class="card-image-container">
                        ${card.imageUrl ? 
                            `<img src="${card.imageUrl}" alt="${card.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                             <div class="card-placeholder" style="display:none;">${card.name}<br>${card.set}</div>` :
                            `<div class="card-placeholder">${card.name}<br>${card.set}</div>`
                        }
                        <div class="card-bookmark">🔖</div>
                    </div>
                    <div class="card-info">
                        <div class="card-quantity">${getTotalQuantity(card)} Available</div>
                        <div class="card-price">$${card.price.toFixed(2)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function getTotalQuantity(card) {
            return card.conditions.reduce((sum, c) => sum + c.qty, 0);
        }
        
        // Search
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            clearBtn.classList.toggle('visible', query.length > 0);
            
            filteredCards = realCards.filter(card => 
                card.name.toLowerCase().includes(query) ||
                card.set.toLowerCase().includes(query)
            );
            
            applyFilters();
            renderCards(filteredCards);
            updateResultsCount();
            checkClearAllVisibility();
        });
        
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.classList.remove('visible');
            filteredCards = [...realCards];
            applyFilters();
            renderCards(filteredCards);
            updateResultsCount();
        });
        
        // Sort
        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const sortType = btn.dataset.sort;
                currentSort = sortType;
                
                filteredCards.sort((a, b) => {
                    switch(sortType) {
                        case 'year': return b.year - a.year;
                        case 'name': return a.name.localeCompare(b.name);
                        case 'price': return b.price - a.price;
                        case 'rarity': 
                            const rarityOrder = {'Ultra Rare': 4, 'Holo Rare': 3, 'Rare': 2, 'Uncommon': 1, 'Common': 0};
                            return (rarityOrder[b.rarity] || 0) - (rarityOrder[a.rarity] || 0);
                        default: return 0;
                    }
                });
                
                renderCards(filteredCards);
            });
        });
        
        // Quick Access Buttons
        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const pokemon = btn.dataset.pokemon;
                
                // Skip Eevee - it has its own modal handler
                if (pokemon === 'Eevee') {
                    return;
                }
                
                const wasActive = btn.classList.contains('active');
                
                document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
                
                if (wasActive) {
                    filteredCards = [...realCards];
                } else {
                    btn.classList.add('active');
                    filteredCards = realCards.filter(card => card.name === pokemon);
                }
                
                applyFilters();
                renderCards(filteredCards);
                updateResultsCount();
                checkClearAllVisibility();
            });
        });
        
        // Filters
        const filterBtn = document.getElementById('filterBtn');
        const filterPanel = document.getElementById('filterPanel');
        const filterClose = document.getElementById('filterClose');
        
        filterBtn.addEventListener('click', () => filterPanel.classList.add('active'));
        filterClose.addEventListener('click', () => filterPanel.classList.remove('active'));

        function applyFilters() {
            const selectedRarities = Array.from(document.querySelectorAll('.filter-rarity:checked')).map(cb => cb.value);
            const selectedTypes = Array.from(document.querySelectorAll('.filter-type:checked')).map(cb => cb.value);
            
            let cards = [...realCards];
            
            // Apply search
            const query = searchInput.value.toLowerCase();
            if (query) {
                cards = cards.filter(card => 
                    card.name.toLowerCase().includes(query) ||
                    card.set.toLowerCase().includes(query)
                );
            }
            
            // Apply quick access filter
            const activeQuickBtn = document.querySelector('.quick-btn.active');
            if (activeQuickBtn) {
                const pokemon = activeQuickBtn.dataset.pokemon;
                cards = cards.filter(card => card.name === pokemon);
            }
            
            // Apply rarity filter
            if (selectedRarities.length > 0) {
                cards = cards.filter(card => selectedRarities.includes(card.rarity));
            }
            
            // Apply type filter
            if (selectedTypes.length > 0) {
                cards = cards.filter(card => selectedTypes.includes(card.type));
            }
            
            filteredCards = cards;
        }
        
        function updateResultsCount() {
            const count = document.getElementById('resultsCount');
            if (searchInput.value || document.querySelector('.quick-btn.active') ||

        function getConditionName(code) {
            const names = {
                'NM': 'Near Mint (NM)',
                'LP': 'Lightly Played (LP)',
                'MP': 'Moderately Played (MP)',
                'HP': 'Heavily Played (HP)',
                'DMG': 'Damaged'

            return names[code] || code;

        async function updatePrices() {
            const card = filteredCards[currentCardIndex];
            const btn = event.target.closest('.update-price-btn');
            
            if (!card.tcgPlayerId || card.tcgPlayerId === '') {
                btn.innerHTML = '<span>❌</span><span>No TCG ID</span>';
                setTimeout(() => {
                    btn.innerHTML = '<span>🔄</span><span>Update Prices</span>';
                }, 2000);
                return;
            }
            
            btn.classList.add('loading');
            btn.innerHTML = '<span>⏳</span><span>Updating...</span>';
            
            try {
                // Fetch current price from API
                const url = `${API_CONFIG.BASE_URL}${API_CONFIG.ENDPOINTS.CARDS}?tcgPlayerId=${card.tcgPlayerId}`;
                
                console.log('📡 Fetching prices from:', url);
                
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${API_CONFIG.API_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`API request failed: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('✅ Price data received:', data);
                
                // Update the card's price in memory
                if (data && data.prices && data.prices.market) {
                    card.price = data.prices.market;
                    card.prices = card.prices || {};
                    
                    // Update condition prices if available
                    if (data.prices.nm) card.prices.NM = data.prices.nm;
                    if (data.prices.lp) card.prices.LP = data.prices.lp;
                    if (data.prices.mp) card.prices.MP = data.prices.mp;
                    if (data.prices.hp) card.prices.HP = data.prices.hp;
                    if (data.prices.dmg) card.prices.DMG = data.prices.dmg;
                    
                    card.lastUpdated = new Date().toISOString().split('T')[0];
                    
                    // Re-render modal to show new prices
                    renderModal();
                    
                    btn.classList.remove('loading');
                    btn.innerHTML = '<span>✅</span><span>Prices Updated</span>';
                } else {
                    throw new Error('No price data in response');
                }
                
                setTimeout(() => {
                    btn.innerHTML = '<span>🔄</span><span>Update Prices</span>';
                }, 2000);
                
            } catch (error) {
                console.error('Error updating prices:', error);
                btn.classList.remove('loading');
                btn.innerHTML = '<span>❌</span><span>Update Failed</span>';
                
                setTimeout(() => {
                    btn.innerHTML = '<span>🔄</span><span>Update Prices</span>';
                }, 2000);
            }
        }

        async function loadEbayData(cardId) {
            const ebayContent = document.getElementById('ebayContent');
            
            // Show loading state
            ebayContent.innerHTML = `
                <div class="ebay-loading">
                    <div>⏳ Fetching eBay sales data...</div>
                    <div style="font-size: 12px; margin-top: 8px; opacity: 0.7;">This may take a few seconds</div>
                </div>
            `;
            
            try {
                // Get the card's TCGPlayer ID
                const card = filteredCards.find(c => c.id == cardId); // Use == for type coercion
                console.log('🔍 Card lookup:', {cardId, card, tcgPlayerId: card?.tcgPlayerId, type: typeof card?.tcgPlayerId});
                
                if (!card || !card.tcgPlayerId || card.tcgPlayerId === '') {
                    throw new Error('Card does not have a TCGPlayer ID');
                }
                
                // Fetch real eBay data from API
                const ebayData = await fetchEbayDataFromAPI(card.tcgPlayerId);
                
                // Cache the data
                ebayDataCache.set(cardId, ebayData);
                
                // Render the data
                renderEbayData(cardId, ebayData);
                
            } catch (error) {
                console.error('Error loading eBay data:', error);
                ebayContent.innerHTML = `
                    <div class="no-ebay-data">
                        <div style="font-size: 24px; margin-bottom: 8px;">❌</div>
                        <div>Failed to load eBay data</div>
                        <div style="font-size: 12px; margin-top: 8px; opacity: 0.7;">${error.message}</div>
                        <button class="load-ebay-btn" onclick="loadEbayData('${cardId}')" style="max-width: 200px; margin: 16px auto 0;">
                            <span>🔄</span>
                            <span>Retry</span>
                        </button>
                    </div>
                `;
            }
        }
        
        async function fetchEbayDataFromAPI(tcgPlayerId) {
            // Build API URL
            const url = `${API_CONFIG.BASE_URL}${API_CONFIG.ENDPOINTS.CARDS}?tcgPlayerId=${tcgPlayerId}&includeEbay=true`;
            
            console.log('📡 Fetching eBay data from:', url);
            
            const response = await fetch(url, {
                headers: {
                    'Authorization': `Bearer ${API_CONFIG.API_KEY}`,
                    'Content-Type': 'application/json'
                }
            });
            
            if (!response.ok) {
                throw new Error(`API request failed: ${response.status} ${response.statusText}`);
            }
            
            const data = await response.json();
            
            console.log('✅ eBay data received:', data);
            
            // Extract eBay data from response
            if (data && data.ebay) {
                return data.ebay;
            } else {
                throw new Error('No eBay data available for this card');
            }
        }

        function renderEbayData(cardId, ebayData) {
            const ebayContent = document.getElementById('ebayContent');
            
            if (!ebayData || !ebayData.salesByGrade || Object.keys(ebayData.salesByGrade).length === 0) {
                ebayContent.innerHTML = `
                    <div class="no-ebay-data">
                        <div style="font-size: 24px; margin-bottom: 8px;">📭</div>
                        <div>No eBay sales data available</div>
                        <div style="font-size: 12px; margin-top: 8px; opacity: 0.7;">This card may not have recent graded sales on eBay</div>
                    </div>
                `;
                return;
            }
            
            // Calculate overall stats
            const grades = Object.entries(ebayData.salesByGrade);
            const allSales = grades.reduce((sum, [_, data]) => sum + data.count, 0);
            const allPrices = grades.flatMap(([_, data]) => 
                Array(data.count).fill(data.averagePrice)
            );
            const avgPrice = allPrices.reduce((a, b) => a + b, 0) / allPrices.length;
            const medianPrice = calculateMedian(allPrices);
            const minPrice = Math.min(...grades.map(([_, data]) => data.minPrice));
            const maxPrice = Math.max(...grades.map(([_, data]) => data.maxPrice));
            
            // Set default selected grade to the one with most sales
            if (!selectedGrade) {
                selectedGrade = grades.sort((a, b) => b[1].count - a[1].count)[0][0];
            }
            
            const selectedData = ebayData.salesByGrade[selectedGrade];
            
            ebayContent.innerHTML = `
                <!-- Summary Stats -->
                <div class="ebay-stats-grid">
                    <div class="ebay-stat-card">
                        <div class="ebay-stat-label">Average</div>
                        <div class="ebay-stat-value price">$${avgPrice.toLocaleString()}</div>
                    </div>

                        <div class="ebay-stat-label">Median</div>
                        <div class="ebay-stat-value price">$${medianPrice.toLocaleString()}</div>
                    </div>
                    <div class="ebay-stat-card">
                        <div class="ebay-stat-label">Range</div>
                        <div class="ebay-stat-value">$${minPrice.toLocaleString()} - $${maxPrice.toLocaleString()}</div>
                    </div>
                    <div class="ebay-stat-card">
                        <div class="ebay-stat-label">Total Sales</div>
                        <div class="ebay-stat-value">${allSales}</div>
                    </div>

                <div class="grade-selector">
                    ${grades.map(([grade, data]) => {
                        const displayGrade = formatGradeName(grade);
                        return `
                            <button class="grade-btn ${grade === selectedGrade ? 'active' : ''}" 
                                    onclick="selectGrade('${cardId}', '${grade}')">
                                ${displayGrade}
                                <span class="count">(${data.count})</span>
                            </button>
                        `;
                    }).join('')}
                </div>
                
                <!-- Selected Grade Stats -->
                <div class="section-title" style="margin-top: 24px; margin-bottom: 16px;">${formatGradeName(selectedGrade)} Sales</div>
                <div class="ebay-stats-grid">
                    <div class="ebay-stat-card">
                        <div class="ebay-stat-label">Average</div>
                        <div class="ebay-stat-value price">$${selectedData.averagePrice.toLocaleString()}</div>
                    </div>
                    <div class="ebay-stat-card">
                        <div class="ebay-stat-label">Median</div>
                        <div class="ebay-stat-value price">$${selectedData.medianPrice.toLocaleString()}</div>
                    </div>
                    <div class="ebay-stat-card">
                        <div class="ebay-stat-label">Min - Max</div>
                        <div class="ebay-stat-value">$${selectedData.minPrice.toLocaleString()} - $${selectedData.maxPrice.toLocaleString()}</div>
                    </div>
                    <div class="ebay-stat-card">
                        <div class="ebay-stat-label">Sales Count</div>
                        <div class="ebay-stat-value">${selectedData.count}</div>
                    </div>
                </div>
                
                ${renderSalesTable(ebayData, selectedGrade)}
                
                <div class="ebay-verified">
                    <span>✅</span>
                    <span>Based on ${allSales} actual eBay sales • Updated ${formatDate(ebayData.updatedAt)}</span>
                </div>
            `;
        }
        
        function renderSalesTable(ebayData, grade) {
            if (!ebayData.soldListings || !ebayData.soldListings[grade] || ebayData.soldListings[grade].length === 0) {
                return `
                    <div style="text-align: center; padding: 24px; color: var(--text-tertiary); font-size: 14px;">
                        Individual sale details require Business tier ($99/mo)
                    </div>
                `;
            }
            
            const listings = ebayData.soldListings[grade];
            
            return `
                <div class="section-title" style="margin-top: 24px; margin-bottom: 16px;">Recent Sales</div>
                <div class="sales-table">
                    <div class="sales-table-header">
                        <div>Date Sold</div>
                        <div>Price</div>
                        <div>Type</div>
                        <div>Best Offer</div>
                        <div>Link</div>
                    </div>
                    ${listings.slice(0, 10).map(listing => `
                        <div class="sales-table-row">
                            <div class="sale-date">${formatDate(listing.soldDate)}</div>
                            <div class="sale-price">$${listing.price.toLocaleString()}</div>
                            <div>
                                <span class="sale-type ${listing.listingType === 'auction' ? 'auction' : 'buy-now'}">
                                    ${listing.listingType === 'auction' ? 'Auction' : 'Buy Now'}
                                </span>
                            </div>
                            <div>
                                ${listing.bestOfferAccepted ? '<span class="best-offer-badge">✓ Yes</span>' : '-'}
                            </div>
                            <div>
                                <a href="${listing.url}" target="_blank" class="ebay-link" title="View on eBay">🔗</a>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function selectGrade(cardId, grade) {
            selectedGrade = grade;
            const ebayData = ebayDataCache.get(cardId);
            if (ebayData) {
                renderEbayData(cardId, ebayData);
            }
        }
        
        function formatGradeName(grade) {
            // Convert "psa10" to "PSA 10", "cgc9.5" to "CGC 9.5", etc.
            const match = grade.match(/^([a-z]+)([0-9.]+)$/i);
            if (match) {
                return `${match[1].toUpperCase()} ${match[2]}`;
            }
            return grade.toUpperCase();
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            if (diffDays < 30) return `${Math.floor(diffDays / 7)} weeks ago`;
            
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
        
        function calculateMedian(arr) {
            const sorted = [...arr].sort((a, b) => a - b);
            const mid = Math.floor(sorted.length / 2);
            return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
        }

            if (e.key === 'ArrowLeft') document.getElementById('prevCard').click();
            if (e.key === 'ArrowRight') document.getElementById('nextCard').click();
        });

    <!-- PWA Service Worker Registration -->
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then(registration => {
                    console.log('✅ ServiceWorker registered:', registration.scope);
                })
                .catch(err => {
                    console.log('❌ ServiceWorker registration failed:', err);
                });
        });
    }
    
    // Install prompt for iOS
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('💡 Install prompt available');
    });
    </script>
